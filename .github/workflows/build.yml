name: Fabric 26.1.2

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Fabric 26.1.2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-tags: true
          fetch-depth: 0
          filter: tree:0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          add-job-summary-as-pr-comment: on-failure
          dependency-graph: generate-and-submit

      - name: Build Fabric 26.1.2 mod
        run: ./gradlew unpackAllJars assemble --stacktrace

      - name: Prepare artifact
        run: |
          rm -f build/libs/*sources*.jar build/libs/*-api*.jar
          sha256sum build/libs/Firmament-*.jar

      - name: Upload Fabric 26.1.2 artifact
        uses: actions/upload-artifact@v5
        with:
          name: firmament-fabric-26.1.2
          path: build/libs/Firmament-*.jar
          if-no-files-found: error

  release:
    name: Create Fabric 26.1.2 release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.event_name != 'release'
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      body-file: CHANGELOG.md
    steps:
      - name: Download Fabric 26.1.2 artifact
        uses: actions/download-artifact@v5
        with:
          name: firmament-fabric-26.1.2

      - name: Create GitHub release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          tag="26.1.2-${RUN_NUMBER}"
          body="Fabric build for Minecraft 26.1.2."
          printf '%s\n' "$body" > CHANGELOG.md
          gh release create "$tag" *.jar \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Firmament 26.1.2 ${RUN_NUMBER}" \
            --notes-file CHANGELOG.md
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish Fabric 26.1.2
    runs-on: ubuntu-latest
    needs:
      - build
      - release
    if: always() && needs.build.result == 'success' && (needs.release.result == 'success' || (github.event_name == 'release' && github.event.action == 'published'))
    environment:
      name: Modrinth
      url: ${{ steps.mc-publish.outputs.modrinth-url }}
    steps:
      - name: Download Fabric 26.1.2 artifact
        uses: actions/download-artifact@v5
        with:
          name: firmament-fabric-26.1.2

      - name: Write changelog
        run: printf '%s' "$CHANGELOG" > CHANGELOG.md
        env:
          CHANGELOG: ${{ github.event_name == 'release' && github.event.release.body || 'Fabric build for Minecraft 26.1.2.' }}

      - name: Publish Fabric 26.1.2 to Modrinth
        id: mc-publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: IJNUBZ2a
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: "*.jar"
          loaders: fabric
          game-versions: "26.1.2"
          version: ${{ github.event_name == 'release' && github.event.release.tag_name || needs.release.outputs.tag }}
          changelog-file: CHANGELOG.md
