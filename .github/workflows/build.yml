name: Fabric 26.1.2

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Fabric 26.1.2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-tags: true
          fetch-depth: 0
          filter: tree:0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          add-job-summary-as-pr-comment: on-failure
          dependency-graph: generate-and-submit

      - name: Build Fabric 26.1.2 mod
        run: ./gradlew unpackAllJars assemble --stacktrace

      - name: Prepare artifact
        run: |
          rm -f build/libs/*sources*.jar build/libs/*-api*.jar
          sha256sum build/libs/Firmod-*.jar

      - name: Upload Fabric 26.1.2 artifact
        uses: actions/upload-artifact@v5
        with:
          name: firmod-fabric-26.1.2
          path: build/libs/Firmod-*.jar
          if-no-files-found: error

  release:
    name: Create Fabric 26.1.2 release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Download Fabric 26.1.2 artifact
        uses: actions/download-artifact@v5
        with:
          name: firmod-fabric-26.1.2

      - name: Create GitHub release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tag="$TAG_NAME"
          body="Fabric build for Minecraft 26.1.2."
          printf '%s\n' "$body" > CHANGELOG.md
          gh release create "$tag" *.jar \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Firmod ${tag}" \
            --notes-file CHANGELOG.md
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
